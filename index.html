<!DOCTYPE html>
<html>
<head>
  <title>Your Name</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    .small {
      font-size: 12px;
      cursor: pointer;
    }

    .big {
      font-size: 28px;
    }
  </style>
</head>

<body>

<h1>Your Name</h1>

<p class="small" onclick="this.classList.toggle('big')">
  click me to grow
</p>

<p>
  artist, writer, whatever you want
</p>

</body>
</html>
